definitions:
  config.CORS:
    properties:
      mode:
        type: string
      whitelist:
        items:
          $ref: '#/definitions/config.CORSWhitelist'
        type: array
    type: object
  config.CORSWhitelist:
    properties:
      allow-credentials:
        type: boolean
      allow-headers:
        type: string
      allow-methods:
        type: string
      allow-origin:
        type: string
      expose-headers:
        type: string
    type: object
  config.Captcha:
    properties:
      img-height:
        description: 验证码高度
        type: integer
      img-width:
        description: 验证码宽度
        type: integer
      key-long:
        description: 验证码长度
        type: integer
      open-captcha:
        description: 防爆破验证码开启此数，0代表每次登录都需要验证码，其他数字代表错误密码此数，如3代表错误三次后出现验证码
        type: integer
      open-captcha-timeout:
        description: 防爆破验证码超时时间，单位：s(秒)
        type: integer
    type: object
  config.ClickHouse:
    properties:
      config:
        description: 高级配置
        type: string
      db-name:
        description: 数据库名
        type: string
      dbName:
        properties:
          v1:
            type: string
          v2:
            type: string
        type: object
      engine:
        default: InnoDB
        description: 数据库引擎，默认InnoDB
        type: string
      log-mode:
        description: 是否开启Gorm全局日志
        type: string
      log-zap:
        description: 是否通过zap写入日志文件
        type: boolean
      max-idle-conns:
        description: 空闲中的最大连接数
        type: integer
      max-open-conns:
        description: 打开到数据库的最大连接数
        type: integer
      password:
        description: 数据库密码
        type: string
      path:
        description: 数据库地址
        type: string
      port:
        description: 数据库端口
        type: string
      prefix:
        description: 数据库前缀
        type: string
      singular:
        description: 是否开启全局禁用复数，true表示开启
        type: boolean
      username:
        description: 数据库账号
        type: string
    type: object
  config.DiskList:
    properties:
      mount-point:
        type: string
    type: object
  config.Email:
    properties:
      from:
        description: 发件人  你自己要发邮件的邮箱
        type: string
      host:
        description: 服务器地址 例如 smtp.qq.com  请前往QQ或者你要发邮件的邮箱查看其smtp协议
        type: string
      isSSL:
        description: 是否SSL   是否开启SSL
        type: boolean
      nickname:
        description: 昵称    发件人昵称 通常为自己的邮箱
        type: string
      port:
        description: 端口     请前往QQ或者你要发邮件的邮箱查看其smtp协议 大多为 465
        type: integer
      secret:
        description: 密钥    用于登录的密钥 最好不要用邮箱密码 去邮箱smtp申请一个用于登录的密钥
        type: string
      to:
        description: 收件人:多个以英文逗号分隔 例：a@qq.com b@qq.com 正式开发中请把此项目作为参数使用
        type: string
    type: object
  config.JWT:
    properties:
      buffer-time:
        description: 缓冲时间
        type: string
      expires-time:
        description: 过期时间
        type: string
      issuer:
        description: 签发者
        type: string
      signing-key:
        description: jwt签名
        type: string
    type: object
  config.Local:
    properties:
      path:
        description: 本地文件访问路径
        type: string
      store-path:
        description: 本地文件存储路径
        type: string
    type: object
  config.Mysql:
    properties:
      config:
        description: 高级配置
        type: string
      db-name:
        description: 数据库名
        type: string
      dbName:
        properties:
          service:
            type: string
          system:
            type: string
        type: object
      engine:
        default: InnoDB
        description: 数据库引擎，默认InnoDB
        type: string
      log-mode:
        description: 是否开启Gorm全局日志
        type: string
      log-zap:
        description: 是否通过zap写入日志文件
        type: boolean
      max-idle-conns:
        description: 空闲中的最大连接数
        type: integer
      max-open-conns:
        description: 打开到数据库的最大连接数
        type: integer
      password:
        description: 数据库密码
        type: string
      path:
        description: 数据库地址
        type: string
      port:
        description: 数据库端口
        type: string
      prefix:
        description: 数据库前缀
        type: string
      singular:
        description: 是否开启全局禁用复数，true表示开启
        type: boolean
      username:
        description: 数据库账号
        type: string
    type: object
  config.Policy:
    properties:
      dir:
        type: string
      ip:
        type: string
      path:
        type: string
      port:
        type: string
      sendUrl:
        type: string
      userName:
        type: string
      userPwd:
        type: string
    type: object
  config.Redis:
    properties:
      addr:
        description: 服务器地址:端口
        type: string
      clusterAddrs:
        description: 集群模式下的节点地址列表
        items:
          type: string
        type: array
      db:
        description: 单实例模式下redis的哪个数据库
        type: integer
      password:
        description: 密码
        type: string
      useCluster:
        description: 是否使用集群模式
        type: boolean
    type: object
  config.Server:
    properties:
      captcha:
        $ref: '#/definitions/config.Captcha'
      clickhouse:
        $ref: '#/definitions/config.ClickHouse'
      cors:
        allOf:
        - $ref: '#/definitions/config.CORS'
        description: 跨域配置
      deployment-date:
        description: 查询数据库切换临界时间点
        type: string
      disk-list:
        items:
          $ref: '#/definitions/config.DiskList'
        type: array
      email:
        $ref: '#/definitions/config.Email'
      export-limit:
        description: 导出数量限制
        type: integer
      jwt:
        $ref: '#/definitions/config.JWT'
      local:
        allOf:
        - $ref: '#/definitions/config.Local'
        description: oss
      mysql:
        allOf:
        - $ref: '#/definitions/config.Mysql'
        description: gorm
      policy:
        $ref: '#/definitions/config.Policy'
      redis:
        allOf:
        - $ref: '#/definitions/config.Redis'
        description: redis
      select-isp:
        description: 大类、小类选出来需要分析的运营商
        type: string
      system:
